# HTTP — redirect to HTTPS + ACME challenge
server {
    listen 80;
    server_name sadcat.site www.sadcat.site;
    charset utf-8;

    # Let's Encrypt webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://sadcat.site$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name sadcat.site www.sadcat.site;
    charset utf-8;

    # Docker DNS (avoid stale upstream IP after container restart)
    resolver 127.0.0.11 valid=10s ipv6=off;

    ssl_certificate     /etc/letsencrypt/live/sadcat.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sadcat.site/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    root /usr/share/nginx/html;
    index index.html;

    # Clean URLs
    location = /gamble {
        try_files /gamble.html =404;
    }
    location = /wheel {
        return 404;
    }

    # Captcha page proxy → backend
    location /captcha {
        set $backend_upstream backend:8000;
        proxy_pass         http://$backend_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Verification API proxy → backend
    location /verify/ {
        set $backend_upstream backend:8000;
        proxy_pass         http://$backend_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # API proxy → backend
    location /api/ {
        set $backend_upstream backend:8000;
        proxy_pass         http://$backend_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Frontend
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
