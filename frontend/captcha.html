    body {

    .verification-title {
      font-size: 1.5rem;

    .captcha-wrapper {
      margin: 1.5rem 0;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .status-message {

    .info-box {

    .success-box {

      border-radius: 8px;
      padding: 1rem;

      padding: 1rem;

    }
    
    .spin {
      animation: spin 1s linear infinite;
      display: inline-block;
    }
    
    @keyframes spin {

    .back-link {

    .back-link a {

      letter-spacing: 1px;
      transition: all 0.3s ease;
    }
    
    .back-link a:hover {
      color: #00ff88;
      text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
    }

<body>

  <main>

  <script src="https://smartcaptcha.yandexcloud.net/captcha.js" async></script>
  <script>
  // ---- Pixel rocket cursor ----
  (function initRocket() {
    const SZ = 4; // 1 pixel unit size in px
    // Rocket shape: [col, row, color] — origin top-left
    // Drawing a small pixel rocket pointing up, flying right (rotated 90deg via CSS)
    const pixels = [
      // nose
      [3,0,'#FF2222'],
      // body
      [2,1,'#FF4444'],[3,1,'#FF2222'],[4,1,'#FF4444'],
      [1,2,'#FF5555'],[2,2,'#FF2222'],[3,2,'#FF2222'],[4,2,'#FF2222'],[5,2,'#FF5555'],
      [1,3,'#FF4444'],[2,3,'#FF2222'],[3,3,'#FFFFFF'],[4,3,'#FF2222'],[5,3,'#FF4444'],
      [2,4,'#FF4444'],[3,4,'#FF2222'],[4,4,'#FF4444'],
      // wings
      [0,3,'#CC1111'],[6,3,'#CC1111'],
      [0,4,'#CC1111'],[6,4,'#CC1111'],
      // exhaust flame
      [2,5,'#FFA500'],[3,5,'#FFDD00'],[4,5,'#FFA500'],
      [3,6,'#FF6600'],
    ];

    const W = 7, H = 7;
    const canvas = document.createElement('canvas');
    canvas.width  = W * SZ;
    canvas.height = H * SZ;
    canvas.style.cssText = 'position:fixed;pointer-events:none;z-index:99999;display:none;image-rendering:pixelated;';
    document.body.appendChild(canvas);
    const ctx = canvas.getContext('2d');
    pixels.forEach(([c, r, color]) => {
      ctx.fillStyle = color;
      ctx.fillRect(c * SZ, r * SZ, SZ, SZ);
    });

    // Trail particles
    const trail = [];
    const TRAIL_LEN = 10;

    let mx = -200, my = -200;
    let rx = -200, ry = -200;
    let angle = 0;
    let targetAngle = 0;

    document.addEventListener('mousemove', e => {
      const dx = e.clientX - rx;
      const dy = e.clientY - ry;
      if (Math.abs(dx) > 1 || Math.abs(dy) > 1) {
        targetAngle = Math.atan2(dy, dx) * (180 / Math.PI) + 90;
      }
      mx = e.clientX;
      my = e.clientY;
      canvas.style.display = 'block';
    });

    document.addEventListener('mouseleave', () => { canvas.style.display = 'none'; });

    // Trail container
    const trailContainer = document.createElement('div');
    trailContainer.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:99998;';
    document.body.appendChild(trailContainer);

    function lerp(a, b, t) { return a + (b - a) * t; }
    function lerpAngle(a, b, t) {
      let diff = ((b - a + 540) % 360) - 180;
      return a + diff * t;
    }

    function spawnTrailPixel(x, y) {
      const p = document.createElement('div');
      const colors = ['#FF2222','#FF6600','#FFA500','#FFDD00'];
      const color  = colors[Math.floor(Math.random() * colors.length)];
      const size   = SZ * (Math.random() > 0.5 ? 2 : 1);
      p.style.cssText = `
        position:fixed;width:${size}px;height:${size}px;
        background:${color};
        left:${x - size/2}px;top:${y - size/2}px;
        pointer-events:none;
        image-rendering:pixelated;
        transition:opacity 0.35s linear, transform 0.35s linear;
      `;
      trailContainer.appendChild(p);
      trail.push(p);
      requestAnimationFrame(() => {
        p.style.opacity = '0';
        p.style.transform = `translate(${(Math.random()-0.5)*12}px,${(Math.random()-0.5)*12}px)`;
      });
      setTimeout(() => { if (p.parentNode) p.parentNode.removeChild(p); }, 400);
      if (trail.length > TRAIL_LEN * 3) {
        const old = trail.shift();
        if (old && old.parentNode) old.parentNode.removeChild(old);
      }
    }

    let lastTrail = 0;
    function animate(ts) {
      rx = lerp(rx, mx, 0.18);
      ry = lerp(ry, my, 0.18);
      angle = lerpAngle(angle, targetAngle, 0.12);

      const hw = canvas.width  / 2;
      const hh = canvas.height / 2;
      canvas.style.left = (rx - hw) + 'px';
      canvas.style.top  = (ry - hh) + 'px';
      canvas.style.transform = `rotate(${angle}deg)`;

      if (ts - lastTrail > 40) {
        // spawn trail at exhaust position (bottom center of rocket, rotated)
        const rad = (angle - 90) * Math.PI / 180;
        const ex = rx + Math.cos(rad + Math.PI) * hh * 0.9;
        const ey = ry + Math.sin(rad + Math.PI) * hh * 0.9;
        spawnTrailPixel(ex, ey);
        lastTrail = ts;
      }

      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);
  })();

  // ---- Pixel star particles ----
  (function spawnParticles() {
    const container = document.getElementById('bgParticles');
    if (!container) return;
    const colors = ['#00E5FF', '#4D9FFF', '#1E5CFF', '#FFD700', '#00FF88'];
    for (let i = 0; i < 40; i++) {
      const p = document.createElement('div');
      const size = (Math.random() > 0.5) ? 2 : 4;
      const color = colors[Math.floor(Math.random() * colors.length)];
      const dur = (2 + Math.random() * 4).toFixed(1);
      const delay = -(Math.random() * 4).toFixed(1);
      p.style.cssText = `
        position:absolute;
        width:${size}px; height:${size}px;
        left:${Math.random() * 100}%;
        top:${Math.random() * 100}%;
        background:${color};
        box-shadow:0 0 ${size * 2}px ${color};
        opacity:0;
        animation:pixelBlink ${dur}s ${delay}s infinite steps(2);
      `;
      container.appendChild(p);
    }
    // inject keyframes once
    if (!document.getElementById('pixelBlink-style')) {
      const s = document.createElement('style');
      s.id = 'pixelBlink-style';
      s.textContent = '@keyframes pixelBlink{0%{opacity:0}50%{opacity:0.9}100%{opacity:0}}';
      document.head.appendChild(s);
    }
  })();

  (async function(){
    const status = document.getElementById('status');
    const captchaWrapper = document.getElementById('captcha-wrapper');
    const messageArea = document.getElementById('message-area');
    
    let currentToken = null;
    let currentState = null;
    
    // Получаем state из URL
    const urlParams = new URLSearchParams(window.location.search);
    currentState = urlParams.get('state');
    
    if (!currentState) {
      showError('Invalid verification link');
      return;
    }
    
    function st(txt, color, className){ 
      status.innerHTML = `<span class="${className}" style="color:${color}">${txt}</span>`; 
    }
    
    function showSuccess(msg) {
      messageArea.innerHTML = `<div class="success-box">SUCCESS: ${msg}</div>`;
    }
    
    function showError(msg) {
      messageArea.innerHTML = `<div class="error-box">ERROR: ${msg}</div>`;
    }
    
    // Инициализация Yandex SmartCaptcha
    window.onSmartCaptchaInit = function() {
      console.log('SmartCaptcha initialized!');
      st('SOLVE THE CAPTCHA', '#00ff88', 'status-success');
      
      // Создаем виджет капчи
      const container = document.createElement('div');
      container.id = 'smart-captcha';
      captchaWrapper.appendChild(container);
      console.log('Container created:', container);
      
      // Инициализируем капчу
      try {
        window.smartCaptcha = window.smartcaptcha.render(container, {
          sitekey: 'YANDEX_CLIENT_KEY_HERE', // Будет заменено сервером
          callback: function(token) {
            console.log('Captcha solved, token:', token);
            currentToken = token;
            st('CAPTCHA SOLVED - VERIFYING...', '#00ff88', 'status-success');
            
            // Автоматически отправляем на проверку
            verifyCaptcha();
          }
        });
        console.log('SmartCaptcha rendered with key:', 'YANDEX_CLIENT_KEY_HERE');
      } catch (error) {
        console.error('Error rendering captcha:', error);
        st('ERROR RENDERING CAPTCHA', '#ff4466', 'status-error');
        showError('Error rendering captcha: ' + error.message);
        // Показываем fallback кнопку
        showFallbackCaptcha();
      }
    };
    
    // Fallback капча для теста
    function showFallbackCaptcha() {
      captchaWrapper.innerHTML = `
        <div style="text-align: center; padding: 20px;">
          <p style="color: #00E5FF; margin-bottom: 20px;">CAPTCHA FALLBACK MODE</p>
          <button id="fallback-captcha-btn" style="
            background: linear-gradient(45deg, #00E5FF, #FF006E);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 8px;
            font-family: 'Press Start 2P', monospace;
            display: inline-block;
            margin-right: 10px;
          " onclick="solveFallbackCaptcha()">
            [ VERIFY I'M HUMAN ]
          </button>
          <button id="fallback-verify-btn" style="
            background: #00ff88;
            color: black;
            border: none;
            padding: 15px 20px;
            font-size: 12px;
            cursor: pointer;
            border-radius: 4px;
            font-family: 'Press Start 2P', monospace;
            display: none;
            vertical-align: top;
          " onclick="verifyFallbackCaptcha()">
            [ VERIFY ]
          </button>
        </div>
      `;
    }
    
    // Fallback решение капчи
    window.solveFallbackCaptcha = function() {
      console.log('Fallback captcha solved');
      currentToken = 'fallback_token_' + Date.now();
      st('FALLBACK CAPTCHA SOLVED', '#00ff88', 'status-success');
      
      // Показываем кнопку проверки
      const verifyBtn = document.getElementById('fallback-verify-btn');
      if (verifyBtn) {
        verifyBtn.style.display = 'inline-block';
      }
    };
    
    // Fallback верификация
    window.verifyFallbackCaptcha = function() {
      verifyCaptcha();
    };
    
    // Проверяем загрузку скрипта
    setTimeout(() => {
      if (!window.smartcaptcha) {
        console.error('SmartCaptcha script not loaded!');
        st('ERROR LOADING CAPTCHA', '#ff4466', 'status-error');
        showError('Failed to load Yandex SmartCaptcha. Using fallback mode.');
        // Автоматически показываем fallback
        showFallbackCaptcha();
      } else {
        console.log('SmartCaptcha script loaded:', window.smartcaptcha);
        // Если скрипт загружен но onSmartCaptchaInit не вызван, вызываем вручную
        if (window.smartcaptcha && !window.smartCaptcha) {
          console.log('Calling onSmartCaptchaInit manually...');
          window.onSmartCaptchaInit();
        }
      }
    }, 5000); // Увеличили до 5 секунд
    
    // Ручная проверка и загрузка
    const checkScript = setInterval(() => {
      if (window.smartcaptcha) {
        console.log('SmartCaptcha found!');
        clearInterval(checkScript);
        if (!window.smartCaptcha) {
          window.onSmartCaptchaInit();
        }
      }
    }, 500);
    
    // Если через 10 секунд все еще не работает, показываем fallback
    setTimeout(() => {
      clearInterval(checkScript);
      if (!window.smartCaptcha) {
        console.log('SmartCaptcha failed to initialize, showing fallback...');
        showFallbackCaptcha();
      }
    }, 10000);
    
    // Основная функция верификации
    async function verifyCaptcha() {
      if (!currentToken) {
        showError('Please solve the captcha first');
        return;
      }
      
      st('VERIFYING CAPTCHA...', '#00ff88', 'status-success');
      
      try {
        const response = await fetch('/verify/check', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            smart_token: currentToken,
            state: currentState
          })
        });
        
        const data = await response.json();
        
        if (data.success) {
          st('VERIFICATION SUBMITTED!', '#00ff88', 'status-success');
          showSuccess('VERIFICATION SUBMITTED TO TELEGRAM!');
          
          // Показываем сообщение о проверке в Telegram
          setTimeout(() => {
            showSuccess('CHECK YOUR TELEGRAM FOR RESULTS');
          }, 3000);
        } else {
          showError(data.message || 'Verification failed');
          st('VERIFICATION FAILED', '#ff4466', 'status-error');
        }
      } catch (error) {
        showError('Connection error to server');
        st('CONNECTION ERROR', '#ff4466', 'status-error');
        console.error('Verification error:', error);
      }
    };
    
    // Проверяем статус при загрузке
    st('LOADING CAPTCHA...', 'var(--cyan,#00E5FF)', 'status-loading');
  })();
  </script>
