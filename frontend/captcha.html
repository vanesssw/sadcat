<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SADCAT: VERIFICATION — Human Check</title>
  <link rel="icon" type="image/png" href="/png/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <meta name="yandex-client-key" content="YANDEX_CLIENT_KEY_HERE" />
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      overflow-x: hidden;
    }
    
    .verification-section {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    
    .verification-container {
      max-width: 500px;
      width: 100%;
      background: rgba(0, 229, 255, 0.05);
      border: 2px solid var(--cyan,#00E5FF);
      border-radius: 12px;
      padding: 2rem 1.5rem;
      backdrop-filter: blur(10px);
      position: relative;
    }
    
    .verification-container::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: linear-gradient(45deg, var(--cyan,#00E5FF), var(--magenta,#FF006E), var(--cyan,#00E5FF));
      border-radius: 12px;
      z-index: -1;
      opacity: 0.5;
      animation: borderGlow 3s ease-in-out infinite;
    }
    
    @keyframes borderGlow {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }
    
    .verification-title {
      font-size: 1.5rem;
      color: var(--cyan,#00E5FF);
      text-align: center;
      margin-bottom: 1rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      line-height: 1.2;
    }
    
    .verification-subtitle {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.7);
      text-align: center;
      margin-bottom: 1.5rem;
      line-height: 1.4;
    }
    
    .captcha-wrapper {
      margin: 1.5rem 0;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .status-message {
      text-align: center;
      font-size: 0.7rem;
      letter-spacing: 1px;
      margin-bottom: 1rem;
      min-height: 20px;
    }
    
    .status-loading {
      color: var(--cyan,#00E5FF);
    }
    
    .status-success {
      color: #00ff88;
    }
    
    .status-error {
      color: #ff4466;
    }
    
    .info-box {
      background: rgba(0, 229, 255, 0.1);
      border: 1px solid var(--cyan,#00E5FF);
      border-radius: 8px;
      padding: 1rem;
      margin: 1rem 0;
      font-size: 0.6rem;
      color: var(--cyan,#00E5FF);
      line-height: 1.5;
    }
    
    .success-box {
      background: rgba(0, 255, 136, 0.1);
      border: 1px solid #00ff88;
      border-radius: 8px;
      padding: 1rem;
      margin: 1rem 0;
      font-size: 0.6rem;
      color: #00ff88;
      line-height: 1.5;
    }
    
    .error-box {
      background: rgba(255, 68, 102, 0.1);
      border: 1px solid #ff4466;
      border-radius: 8px;
      padding: 1rem;
      margin: 1rem 0;
      font-size: 0.6rem;
      color: #ff4466;
      line-height: 1.5;
    }
    
    .spin {
      animation: spin 1s linear infinite;
      display: inline-block;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .back-link {
      text-align: center;
      margin-top: 1rem;
    }
    
    .back-link a {
      color: var(--cyan,#00E5FF);
      text-decoration: none;
      font-size: 0.6rem;
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }
    
    .back-link a:hover {
      color: #00ff88;
      text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
    }
  </style>
</head>
<body>
  <div class="scanlines"></div>
  <div class="bg-grid" id="bgParticles"></div>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <a class="logo-text" href="/" style="text-decoration:none">
          <span class="logo-title">SADCAT</span>
          <span class="logo-sub">MONI RUSH</span>
        </a>
      </div>
      <nav class="nav">
        <a class="nav-link" href="/">[ HOME ]</a>
        <a class="nav-link" href="/gamble">[ GAMBLE ]</a>
        <a class="nav-link nav-wheel" href="/wheel" style="opacity:.45;pointer-events:none;cursor:default;">[ WHEEL ]</a>
        <a class="nav-link" href="https://t.me/sadcatgamble" target="_blank" rel="noopener">[ TG ]</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="verification-section">
      <div class="verification-container">
        <h1 class="verification-title">[ VERIFICATION ]</h1>
        <p class="verification-subtitle">COMPLETE THE CAPTCHA TO VERIFY YOU'RE NOT A BOT</p>
        
        <div class="status-message" id="status">
          <span class="spin" style="color:var(--cyan,#00E5FF)">+</span>
          <span style="color:var(--cyan,#00E5FF)"> INITIALIZING...</span>
        </div>
        
        <div class="info-box">
          COMPLETE THE CAPTCHA TO VERIFY YOU'RE NOT A BOT
        </div>
        
        <div class="captcha-wrapper" id="captcha-wrapper">
          <!-- Yandex SmartCaptcha будет загружена сюда -->
        </div>
        
        <div id="message-area"></div>

        <div id="code-info-banner" style="display:none;margin-top:14px;padding:10px 16px;border:1px solid #00e5ff44;background:#00e5ff0d;color:#00e5ff;font-family:'Press Start 2P',monospace;font-size:10px;text-align:center;line-height:1.8;"></div>

        <div class="back-link">
          <a href="/">[ RETURN TO HOME ]</a>
        </div>
      </div>
    </section>
  </main>

  <img src="/png/ant/sugar.png" alt="sugar" style="position:fixed;z-index:10;left:12vw;top:18vh;width:48px;height:48px;opacity:0.18;pointer-events:none;user-select:none;" />

  <script src="/js/captcha.js" defer></script>
</body>
</html>
